<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=3, minimum-scale=1, user-scalable=yes"/>
    <meta http-equiv="Pragma" content="no-cache"/>
    <meta http-equiv="Cache-Control" content="no-cache"/>
    <meta http-equiv="Expires" content="0"/>
    <meta name="format-detection" content="telephone=no">

    <title>정산서 - DGK 영화감독조합 내부데이터 통합관리 시스템</title>

    <!-- font : 프리텐다드 -->
    <link rel="preload" href="./font/woff2-subset/Pretendard-Regular.subset.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="./font/woff2-subset/Pretendard-Medium.subset.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="./font/woff2-subset/Pretendard-SemiBold.subset.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="./font/woff2-subset/Pretendard-Bold.subset.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="./font/woff2-subset/Pretendard-ExtraBold.subset.woff2" as="font" type="font/woff2" crossorigin>
	<link rel="preload" href="./font/woff2-subset/Pretendard-Black.subset.woff2" as="font" type="font/woff2" crossorigin>

    <!-- css : 스타일 -->
    <link rel="stylesheet" href="./css/style.css">

    <!-- js : 자바스크립트 -->
    <script src="./js/jquery-3.7.1.min.js"></script>
    <script src="./js/common.js"></script>
</head>
<body class="statement-print">
    <div id="wrap">

        <div class="statement-section">
            <img src="" alt="">
        </div>
        
    </div>
    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var raw = params.get('img_src');
            if (!raw) return;
            var src = raw.replace(/^['"]|['"]$/g, '').trim();
            if (!src) return;
            var img = document.querySelector('.statement-section img');
            if (img) img.src = src;
        })();
    </script>
</body>
</html>
