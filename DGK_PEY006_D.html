    <script>
        /* 사이드바 네비 현재 메뉴 활성 */
        $(document).ready(function () {
            setSidebarNavActive('prepare'); // 지급 준비
        });
    </script>

    <!-- 정산서 iframe (숨김) : 정산서 이미지 경로 전달 -->
    <iframe id="statement-iframe" src="./print_statement.html?img_src=./img/statement.png" style="position: absolute; width: 0; height: 0; border: 0; opacity: 0; pointer-events: none;" aria-hidden="true"></iframe>

    <!-- 정산서 출력 시작 -->
    <script>
        var statementIframeLoaded = false;
        var statementPrintButton = null;

        // 정산서 iframe 로드 완료 확인
        document.getElementById('statement-iframe').addEventListener('load', function() {
            statementIframeLoaded = true;
            if (statementPrintButton) {
                statementPrintButton.disabled = false;
                statementPrintButton.style.opacity = '1';
                statementPrintButton.style.cursor = 'pointer';
            }
        });

        // 페이지 로드 시 버튼 찾기 및 초기 비활성화
        $(document).ready(function() {
            statementPrintButton = document.querySelector('.btn-print-statement[onclick="printStatement()"]');
            if (statementPrintButton) {
                statementPrintButton.disabled = true;
                statementPrintButton.style.opacity = '0.5';
                statementPrintButton.style.cursor = 'not-allowed';
            }
        });

        function printStatement() {
            if (!statementIframeLoaded) {
                alert('정산서를 불러오는 중입니다. 잠시 후 다시 시도해주세요.');
                return;
            }
            
            var iframe = document.getElementById('statement-iframe');
            if (iframe && iframe.contentWindow) {
                iframe.contentWindow.focus();
                iframe.contentWindow.print();
            }
        }
    </script> 
    <!-- 정산서 출력 끝 -->
